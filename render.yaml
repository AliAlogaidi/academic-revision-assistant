services:
  - type: web
    name: academic-revision-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TOHUMAN_INTENSITY
        value: aggressive
      - key: TOHUMAN_API_TOKEN
        sync: false