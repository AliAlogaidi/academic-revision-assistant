services:
  - type: web
    name: academic-revision-assistant
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TOHUMAN_INTENSITY
        value: aggressive
      - key: TOHUMAN_API_TOKEN
        sync: false
